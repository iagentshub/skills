name: Auto Label PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const labels = new Set();
            const paths = files.map(f => f.filename);

            if (paths.some(p => p.startsWith('public/en/')))          labels.add('new-skill');
            if (paths.some(p => /^public\/(?!en\/)/.test(p)))         labels.add('translation');
            if (paths.some(p => p.startsWith('docs/') || p === 'README.md')) labels.add('docs');
            if (paths.some(p => p.startsWith('.github/')))             labels.add('ci');

            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labels],
              });
            }

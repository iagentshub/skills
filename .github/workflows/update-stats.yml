name: Update Stats

on:
  push:
    branches:
      - main
    paths:
      - 'public/**'

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Count skills and update README and docs
        run: |
          # Use ES as source of truth (has category: in frontmatter)
          ref_lang="es"

          # Count skills
          count=$(ls public/$ref_lang/ | wc -l | tr -d ' ')
          echo "Skills count: $count"

          # Count unique categories from frontmatter
          cat_count=$(grep -h "^category:" public/$ref_lang/*/SKILL.md | sed 's/category: //' | sort -u | wc -l | tr -d ' ')
          echo "Categories count: $cat_count"

          # Update skill count badge in README and docs
          sed -i "s|skills-[0-9]*-6366f1|skills-${count}-6366f1|g" README.md
          sed -i "s|skills-[0-9]*-6366f1|skills-${count}-6366f1|g" docs/en.md
          sed -i "s|skills-[0-9]*-6366f1|skills-${count}-6366f1|g" docs/es.md

          # Update blockquote summary: "X skills across Y categories in Z languages"
          sed -i "s|\*\*[0-9]* skills\*\* across \*\*[0-9]* categories\*\*|**${count} skills** across **${cat_count} categories**|g" README.md

      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/en.md docs/es.md
          git diff --staged --quiet || git commit -m "chore: update skill count stats [skip ci]"
          git push

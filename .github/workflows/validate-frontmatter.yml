name: Validate Frontmatter

on:
  push:
    paths:
      - 'public/**'
  pull_request:
    paths:
      - 'public/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate required frontmatter fields
        run: |
          failed=0

          for skill_file in public/*/*/SKILL.md; do
            lang=$(echo "$skill_file" | cut -d'/' -f2)
            skill=$(echo "$skill_file" | cut -d'/' -f3)

            if ! head -1 "$skill_file" | grep -q "^---"; then
              echo "❌ [$lang/$skill] Missing frontmatter block"
              failed=1
              continue
            fi

            frontmatter=$(awk '/^---/{p++; if(p==2) exit} p==1' "$skill_file")

            has_name=0
            has_desc=0
            echo "$frontmatter" | grep -q "^name:" && has_name=1
            echo "$frontmatter" | grep -q "^description:" && has_desc=1

            if [ $has_name -eq 0 ]; then
              echo "❌ [$lang/$skill] Missing required field: name"
              failed=1
            fi

            if [ $has_desc -eq 0 ]; then
              echo "❌ [$lang/$skill] Missing required field: description"
              failed=1
            fi

            if [ $has_name -eq 1 ] && [ $has_desc -eq 1 ]; then
              echo "✅ [$lang/$skill]"
            fi
          done

          exit $failed
